<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendarul Emiliei</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --emerald: #4a7c59;
    --emerald-light: #5a9068;
    --emerald-pale: #e8f0eb;
    --emerald-mist: #f5f2ec;
    --beige: #f2ece0;
    --beige-dark: #ddd4c0;
    --beige-deeper: #b8a888;
    --cream: #faf7f2;
    --ink: #2c2620;
    --ink-soft: #5a4f45;
    --ink-muted: #8a7e74;

    /* Category colors */
    --cat-accountancy: #2d6a4f;
    --cat-axis: #8b5e3c;
    --cat-learning: #4a6fa5;
    --cat-family: #c17b3f;
    --cat-personal: #7b5ea7;
    --cat-journal: #9c6b7a;
    --cat-reflections: #5b7fa6;

    --shadow-soft: 0 4px 24px rgba(80,60,40,0.08);
    --shadow-card: 0 2px 12px rgba(80,60,40,0.10);
    --radius: 16px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    font-weight: 300;
  }

  /* SIDEBAR */
  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
  }

  .sidebar {
    background: #f2ece0;
    color: var(--ink);
    padding: 36px 24px;
    display: flex;
    flex-direction: column;
    gap: 32px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    border-right: 1px solid var(--beige-dark);
  }

  .sidebar-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--ink);
    line-height: 1.3;
  }
  .sidebar-title span {
    display: block;
    font-size: 11px;
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 4px;
  }

  /* Mini calendar in sidebar */
  .mini-cal {
    background: white;
    border-radius: var(--radius-sm);
    padding: 16px;
    box-shadow: 0 2px 8px rgba(80,60,40,0.07);
  }
  .mini-cal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .mini-cal-header span {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: var(--ink);
  }
  .mini-cal-nav { background: none; border: none; color: var(--ink-muted); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; transition: background 0.2s; }
  .mini-cal-nav:hover { background: var(--beige-dark); }
  .mini-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .mini-day-name { font-size: 10px; text-align: center; color: var(--ink-muted); padding: 2px; font-weight: 400; letter-spacing: 0.05em; }
  .mini-day {
    font-size: 11px;
    text-align: center;
    padding: 4px 2px;
    border-radius: 50%;
    cursor: pointer;
    color: var(--ink-soft);
    transition: all 0.2s;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mini-day:hover { background: var(--beige-dark); }
  .mini-day.today { background: var(--emerald); color: white; font-weight: 500; }
  .mini-day.selected { background: var(--beige-dark); color: var(--ink); }
  .mini-day.other-month { color: var(--beige-deeper); }
  .mini-day.has-event::after { content: ''; display: block; width: 3px; height: 3px; background: var(--emerald); border-radius: 50%; margin: 1px auto 0; }

  /* Categories */
  .categories-section { flex: 1; }
  .categories-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 12px;
  }
  .category-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 2px;
  }
  .category-item:hover { background: rgba(80,60,40,0.08); }
  .category-item.active { background: white; box-shadow: 0 1px 4px rgba(80,60,40,0.08); }
  .cat-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cat-name { font-size: 13px; font-weight: 400; color: var(--ink-soft); }
  .cat-sub { padding-left: 20px; }
  .cat-sub .cat-dot { width: 7px; height: 7px; }
  .cat-sub .cat-name { font-size: 12px; color: var(--ink-muted); }

  /* Add event btn */
  .add-btn {
    background: var(--emerald);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 12px 20px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
  }
  .add-btn:hover { background: var(--emerald-light); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74,124,89,0.25); }

  /* MAIN */
  .main {
    display: flex;
    flex-direction: column;
    background: var(--cream);
  }

  /* Header */
  .main-header {
    padding: 28px 40px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--beige-dark);
    background: white;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .nav-btn {
    background: none;
    border: 1px solid var(--beige-dark);
    color: var(--ink-soft);
    border-radius: var(--radius-sm);
    padding: 7px 12px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
  }
  .nav-btn:hover { background: var(--emerald-pale); border-color: var(--emerald-light); color: var(--emerald); }
  .today-btn {
    background: var(--emerald);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 7px 16px;
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .today-btn:hover { background: var(--emerald-light); }

  .current-period {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: 0.02em;
  }

  .view-toggle {
    display: flex;
    gap: 4px;
    background: var(--beige);
    padding: 4px;
    border-radius: var(--radius-sm);
  }
  .view-btn {
    background: none;
    border: none;
    padding: 6px 16px;
    border-radius: 6px;
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--ink-muted);
    transition: all 0.2s;
  }
  .view-btn.active { background: white; color: var(--emerald); font-weight: 500; box-shadow: var(--shadow-card); }

  /* MONTH VIEW */
  .month-view { flex: 1; padding: 24px 40px; }

  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: var(--beige-dark);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-soft);
  }

  .day-header {
    background: white;
    text-align: center;
    padding: 12px 8px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  .day-cell {
    background: white;
    min-height: 110px;
    padding: 10px 8px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .day-cell:hover { background: var(--emerald-mist); }
  .day-cell.today { background: #fdf9f4; }
  .day-cell.today .day-number { background: var(--emerald); color: white; }
  .day-cell.other-month { background: #fafaf8; }
  .day-cell.other-month .day-number { color: var(--beige-deeper); }
  .day-cell.selected { background: var(--emerald-pale); }

  .day-number {
    font-size: 13px;
    font-weight: 400;
    color: var(--ink-soft);
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 6px;
    transition: all 0.2s;
  }

  .event-pill {
    font-size: 11px;
    font-weight: 400;
    padding: 2px 7px;
    border-radius: 3px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: opacity 0.2s;
    color: white;
  }
  .event-pill:hover { opacity: 0.85; }

  /* WEEK VIEW */
  .week-view { flex: 1; padding: 24px 40px; overflow: auto; }

  .week-grid {
    display: grid;
    grid-template-columns: 60px repeat(7, 1fr);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-soft);
    background: var(--beige-dark);
    gap: 1px;
  }

  .week-day-header {
    background: white;
    padding: 12px 8px;
    text-align: center;
  }
  .week-day-name { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-muted); font-weight: 500; }
  .week-day-num {
    font-size: 22px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.2;
    margin-top: 2px;
  }
  .week-day-num.today-num {
    background: var(--emerald);
    color: white;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 2px auto 0;
    font-size: 18px;
  }

  .time-col { background: white; }
  .time-slot {
    height: 50px;
    display: flex;
    align-items: flex-start;
    justify-content: flex-end;
    padding: 4px 8px 0;
    font-size: 10px;
    color: var(--ink-muted);
    letter-spacing: 0.05em;
    border-top: 1px solid var(--beige-dark);
  }
  .time-slot:first-child { border-top: none; }

  .week-day-col {
    background: white;
    position: relative;
    min-height: 600px;
  }
  .week-hour-line {
    height: 50px;
    border-top: 1px solid var(--beige);
  }
  .week-event {
    position: absolute;
    left: 3px;
    right: 3px;
    border-radius: 4px;
    padding: 3px 6px;
    font-size: 11px;
    color: white;
    overflow: hidden;
    cursor: pointer;
    transition: opacity 0.2s;
    z-index: 2;
  }
  .week-event:hover { opacity: 0.85; }
  .week-event-title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .week-event-time { font-size: 10px; opacity: 0.85; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,46,34,0.35);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: white;
    border-radius: var(--radius);
    padding: 36px;
    width: 480px;
    max-width: 95vw;
    box-shadow: 0 24px 60px rgba(26,46,34,0.2);
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(-16px) scale(0.97); }
    to { opacity: 1; transform: none; }
  }

  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 24px;
  }
  .modal-close {
    position: absolute;
    top: 20px; right: 24px;
    background: none; border: none;
    font-size: 20px; cursor: pointer;
    color: var(--ink-muted);
  }

  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 6px;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--beige-dark);
    border-radius: var(--radius-sm);
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--ink);
    background: var(--cream);
    transition: border-color 0.2s;
    outline: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--emerald-light);
  }
  .form-textarea { min-height: 80px; resize: vertical; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .save-btn {
    width: 100%;
    background: var(--emerald);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 13px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .save-btn:hover { background: var(--emerald-light); }

  /* EVENT DETAIL MODAL */
  .detail-cat-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 16px;
    color: white;
  }
  .detail-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 500;
    margin-bottom: 12px;
  }
  .detail-meta {
    display: flex;
    flex-direction: column;
    gap: 8px;
    color: var(--ink-soft);
    font-size: 14px;
    margin-bottom: 20px;
  }
  .detail-meta span { display: flex; align-items: center; gap: 8px; }
  .detail-desc {
    background: var(--beige);
    border-radius: var(--radius-sm);
    padding: 14px;
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.6;
    max-height: 150px;
    overflow-y: auto;
  }
  .detail-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .detail-btn {
    flex: 1;
    padding: 10px;
    border-radius: var(--radius-sm);
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid var(--beige-dark);
    background: white;
    color: var(--ink-soft);
  }
  .detail-btn:hover { background: var(--beige); }
  .detail-btn.primary { background: var(--emerald); color: white; border-color: var(--emerald); }
  .detail-btn.primary:hover { background: var(--emerald-light); }

  /* JOURNAL PANEL */
  .journal-panel {
    display: none;
    position: fixed;
    right: 0; top: 0; bottom: 0;
    width: 400px;
    background: white;
    box-shadow: -8px 0 40px rgba(26,46,34,0.12);
    z-index: 50;
    flex-direction: column;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }
  .journal-panel.open { display: flex; }
  .journal-header {
    padding: 28px 28px 20px;
    border-bottom: 1px solid var(--beige-dark);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .journal-header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 500;
  }
  .journal-date { font-size: 12px; color: var(--ink-muted); margin-top: 2px; }
  .journal-close { background: none; border: none; cursor: pointer; color: var(--ink-muted); font-size: 18px; }
  .journal-tabs {
    display: flex;
    padding: 16px 28px 0;
    gap: 0;
    border-bottom: 1px solid var(--beige-dark);
  }
  .journal-tab {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 8px 16px 12px;
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--ink-muted);
    transition: all 0.2s;
    margin-bottom: -1px;
  }
  .journal-tab.active { color: var(--emerald); border-bottom-color: var(--emerald); }
  .journal-content { flex: 1; padding: 24px 28px; overflow-y: auto; }
  .journal-textarea {
    width: 100%;
    height: 100%;
    min-height: 300px;
    border: none;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 300;
    color: var(--ink);
    line-height: 1.8;
    resize: none;
    outline: none;
    background: transparent;
  }
  .journal-textarea::placeholder { color: var(--beige-deeper); }
  .journal-footer {
    padding: 16px 28px;
    border-top: 1px solid var(--beige-dark);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .journal-save {
    background: var(--emerald);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 9px 20px;
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  .journal-save:hover { background: var(--emerald-light); }
  .journal-word-count { font-size: 11px; color: var(--ink-muted); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: white;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 400;
    z-index: 200;
    transition: transform 0.3s ease;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--beige-dark); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--beige-deeper); }
  /* Auth button */
  .auth-btn {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    background: white;
    color: #444;
    border: 1px solid #ddd;
  }
  .auth-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
</style>
<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div>
      <div class="sidebar-title">
        <span>Calendarul</span>
        Emiliei
      </div>
    </div>

    <!-- Mini Calendar -->
    <div class="mini-cal">
      <div class="mini-cal-header">
        <button class="mini-cal-nav" id="miniPrev">‹</button>
        <span id="miniTitle"></span>
        <button class="mini-cal-nav" id="miniNext">›</button>
      </div>
      <div class="mini-cal-grid" id="miniGrid">
        <div class="mini-day-name">L</div>
        <div class="mini-day-name">M</div>
        <div class="mini-day-name">M</div>
        <div class="mini-day-name">J</div>
        <div class="mini-day-name">V</div>
        <div class="mini-day-name">S</div>
        <div class="mini-day-name">D</div>
      </div>
    </div>

    <!-- Categories -->
    <div class="categories-section">
      <div class="categories-label">Categorii</div>

      <div class="category-item active" onclick="filterCat('all')">
        <div class="cat-dot" style="background:var(--emerald-light)"></div>
        <span class="cat-name">Toate</span>
      </div>
      <div class="category-item" onclick="filterCat('accountancy')">
        <div class="cat-dot" style="background:var(--cat-accountancy)"></div>
        <span class="cat-name">Emilia Accountancy</span>
      </div>
      <div class="category-item" onclick="filterCat('axis')">
        <div class="cat-dot" style="background:var(--cat-axis)"></div>
        <span class="cat-name">Axis</span>
      </div>
      <div class="category-item" onclick="filterCat('learning')">
        <div class="cat-dot" style="background:var(--cat-learning)"></div>
        <span class="cat-name">Timp de Învățat</span>
      </div>
      <div class="category-item" onclick="filterCat('family')">
        <div class="cat-dot" style="background:var(--cat-family)"></div>
        <span class="cat-name">Timp cu Familia</span>
      </div>
      <div class="category-item" onclick="filterCat('personal')">
        <div class="cat-dot" style="background:var(--cat-personal)"></div>
        <span class="cat-name">Timp Personal</span>
      </div>
      <div class="cat-sub category-item" onclick="openJournal('notes')">
        <div class="cat-dot" style="background:var(--cat-journal)"></div>
        <span class="cat-name">↳ Notițe zilnice</span>
      </div>
      <div class="cat-sub category-item" onclick="openJournal('reflections')">
        <div class="cat-dot" style="background:var(--cat-reflections)"></div>
        <span class="cat-name">↳ Reflecții</span>
      </div>
      <div class="category-item" onclick="filterCat('google')">
        <div class="cat-dot" style="background:#5b8fb9"></div>
        <span class="cat-name">Google Calendar</span>
      </div>
    </div>

    <button class="add-btn" onclick="openAddModal()">
      <span style="font-size:18px">+</span> Adaugă eveniment
    </button>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <header class="main-header">
      <div class="header-nav">
        <button class="nav-btn" id="prevBtn">‹</button>
        <button class="today-btn" onclick="goToday()">Azi</button>
        <button class="nav-btn" id="nextBtn">›</button>
      </div>
      <div class="current-period" id="currentPeriod"></div>
      <div class="view-toggle">
        <button class="view-btn active" onclick="setView('month', this)">Lunar</button>
        <button class="view-btn" onclick="setView('week', this)">Săptămânal</button>
      </div>
      <button class="auth-btn" id="authBtn" onclick="handleAuthClick()">
        <img src="https://www.google.com/favicon.ico" style="width:14px;height:14px"> Conectează Google
      </button>
    </header>

    <div id="calendarBody"></div>
  </main>
</div>

<!-- ADD EVENT MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="closeModal('addModal')">×</button>
    <div class="modal-title">Eveniment nou</div>
    <div class="form-group">
      <label class="form-label">Titlu</label>
      <input type="text" class="form-input" id="evTitle" placeholder="Titlul evenimentului">
    </div>
    <div class="form-group">
      <label class="form-label">Categorie</label>
      <select class="form-select" id="evCat">
        <option value="accountancy">Emilia Accountancy</option>
        <option value="axis">Axis</option>
        <option value="learning">Timp de Învățat</option>
        <option value="family">Timp cu Familia</option>
        <option value="personal">Timp Personal</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Data început</label>
        <input type="date" class="form-input" id="evStart">

      <div class="form-group">
        <label class="form-label">Data sfârșit</label>
        <input type="date" class="form-input" id="evEnd">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Ora început</label>
        <input type="time" class="form-input" id="evStartTime">
      </div>
      <div class="form-group">
        <label class="form-label">Ora sfârșit</label>
        <input type="time" class="form-input" id="evEndTime">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Note / Descriere</label>
      <textarea class="form-textarea" id="evDesc" placeholder="Detalii opționale..."></textarea>
    </div>
    <button class="save-btn" onclick="saveEvent()">Salvează evenimentul</button>

</div>

<!-- EVENT DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="closeModal('detailModal')">×</button>
    <div id="detailContent"></div>
  </div>
</div>

<!-- JOURNAL PANEL -->
<div class="journal-panel" id="journalPanel">
  <div class="journal-header">
    <div>
      <div class="journal-header-title" id="journalPanelTitle">Notițe zilnice</div>
      <div class="journal-date" id="journalPanelDate"></div>
    </div>
    <button class="journal-close" onclick="closeJournal()">×</button>
  </div>
  <div class="journal-tabs">
    <button class="journal-tab active" id="tab-notes" onclick="switchTab('notes')">Notițe</button>
    <button class="journal-tab" id="tab-reflections" onclick="switchTab('reflections')">Reflecții</button>
  </div>
  <div class="journal-content">
    <textarea class="journal-textarea" id="journalText" placeholder="Scrie aici gândurile tale..."></textarea>
  </div>
  <div class="journal-footer">
    <span class="journal-word-count" id="wordCount">0 cuvinte</span>
    <button class="journal-save" onclick="saveJournal()">Salvează</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============ DATA ============
const MONTHS_RO = ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];
const DAYS_RO = ['Lun','Mar','Mie','Joi','Vin','Sâm','Dum'];
const DAYS_FULL = ['Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă','Duminică'];

const CAT_COLORS = {
  accountancy: '#2d6a4f',
  axis: '#8b5e3c',
  learning: '#4a6fa5',
  family: '#c17b3f',
  personal: '#7b5ea7',
  journal: '#9c6b7a',
  reflections: '#5b7fa6',
  google: '#5b8fb9'
};

const CAT_NAMES = {
  accountancy: 'Emilia Accountancy',
  axis: 'Axis',
  learning: 'Timp de Învățat',
  family: 'Timp cu Familia',
  personal: 'Timp Personal',
  google: 'Google Calendar'
};

// Google Calendar API
const CLIENT_ID = '523237944139-73v5fpmdpopri1ltqjrrk9aag0k4tut7.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';
let googleEvents = [];
let tokenClient;
let gapiInited = false;
let gisInited = false;
let isSignedIn = false;

function gapiLoaded() {
  gapi.load('client', async () => {
    await gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest'] });
    gapiInited = true;
    maybeEnableButtons();
  });
}

function gisLoaded() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { showToast('Eroare la autentificare'); return; }
      isSignedIn = true;
      updateAuthUI();
      await loadAllCalendars();
    }
  });
  gisInited = true;
  maybeEnableButtons();
}

function maybeEnableButtons() {
  if (gapiInited && gisInited) {
    document.getElementById('authBtn').style.display = 'flex';
  }
}

function handleAuthClick() {
  if (!isSignedIn) {
    tokenClient.requestAccessToken({ prompt: 'consent' });
  } else {
    google.accounts.oauth2.revoke(gapi.client.getToken().access_token, () => {
      gapi.client.setToken('');
      isSignedIn = false;
      googleEvents = [];
      updateAuthUI();
      renderCalendar();
      renderMini();
    });
  }
}

function updateAuthUI() {
  const btn = document.getElementById('authBtn');
  if (isSignedIn) {
    btn.textContent = '✓ Google conectat';
    btn.style.background = '#e8f5e9';
    btn.style.color = '#2d6a4f';
    btn.style.border = '1px solid #a5d6a7';
  } else {
    btn.innerHTML = '<img src="https://www.google.com/favicon.ico" style="width:14px;height:14px"> Conectează Google';
    btn.style.background = 'white';
    btn.style.color = '#444';
    btn.style.border = '1px solid #ddd';
  }
}

function gCalDateToStr(dtStr) {
  if (!dtStr) return null;
  return dtStr.substring(0, 10);
}
function gCalTimeToStr(dtStr) {
  if (!dtStr || dtStr.length === 10) return null;
  const d = new Date(dtStr);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

async function loadAllCalendars() {
  try {
    showToast('Se încarcă evenimentele...');
    const calList = await gapi.client.calendar.calendarList.list();
    const cals = calList.result.items || [];
    googleEvents = [];

    const now = new Date();
    const timeMin = new Date(now.getFullYear(), now.getMonth() - 2, 1).toISOString();
    const timeMax = new Date(now.getFullYear(), now.getMonth() + 4, 0).toISOString();

    for (const cal of cals) {
      try {
        const evResp = await gapi.client.calendar.events.list({
          calendarId: cal.id,
          timeMin, timeMax,
          singleEvents: true,
          orderBy: 'startTime',
          maxResults: 250
        });
        const items = evResp.result.items || [];
        items.forEach(ev => {
          const isAllDay = !ev.start.dateTime;
          const start = gCalDateToStr(ev.start.dateTime || ev.start.date);
          const end = gCalDateToStr(ev.end.dateTime || ev.end.date);
          // end date for all-day is exclusive in Google, adjust
          let endAdj = end;
          if (isAllDay && end) {
            const d = new Date(end);
            d.setDate(d.getDate() - 1);
            endAdj = dateStr(d);
          }
          googleEvents.push({
            id: 'g_' + ev.id,
            title: ev.summary || '(fără titlu)',
            start,
            end: endAdj || start,
            cat: 'google',
            allDay: isAllDay,
            startTime: gCalTimeToStr(ev.start.dateTime),
            endTime: gCalTimeToStr(ev.end.dateTime),
            desc: ev.description || '',
            location: ev.location || ''
          });
        });
      } catch(e) { /* skip inaccessible calendar */ }
    }

    renderCalendar();
    renderMini();
    showToast(`✓ ${googleEvents.length} evenimente încărcate`);
  } catch(e) {
    showToast('Eroare la încărcarea evenimentelor');
    console.error(e);
  }
}

let userEvents = JSON.parse(localStorage.getItem('emilia_events') || '[]');
let journalData = JSON.parse(localStorage.getItem('emilia_journal') || '{}');
let activeFilter = 'all';
let currentView = 'month';
let currentDate = new Date(2026, 5, 7); // June 2026
let selectedDate = new Date(2026, 5, 7);
let currentJournalTab = 'notes';

// ============ UTILS ============
function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function getAllEvents() {
  return [...googleEvents, ...userEvents];
}
function getEventsForDay(dateStr) {
  return getAllEvents().filter(e => {
    if (activeFilter !== 'all' && e.cat !== activeFilter) return false;
    return e.start <= dateStr && e.end >= dateStr;
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ============ MINI CALENDAR ============
let miniDate = new Date(currentDate);

function renderMini() {
  const year = miniDate.getFullYear();
  const month = miniDate.getMonth();
  document.getElementById('miniTitle').textContent = `${MONTHS_RO[month].slice(0,3)} ${year}`;

  const grid = document.getElementById('miniGrid');
  // Remove old day cells (keep day name headers)
  const kids = Array.from(grid.children);
  kids.slice(7).forEach(k => k.remove());

  const first = new Date(year, month, 1);
  let startDow = first.getDay(); // 0=Sun
  startDow = startDow === 0 ? 6 : startDow - 1; // Mon=0

  const today = new Date();
  const todayStr = dateStr(today);
  const allEvDates = new Set(getAllEvents().map(e => e.start));

  for (let i = 0; i < startDow; i++) {
    const prev = new Date(year, month, -startDow + i + 1);
    const d = document.createElement('div');
    d.className = 'mini-day other-month';
    d.textContent = prev.getDate();
    grid.appendChild(d);
  }

  const daysInMonth = new Date(year, month+1, 0).getDate();
  for (let i = 1; i <= daysInMonth; i++) {
    const d = document.createElement('div');
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    d.className = 'mini-day' + (ds === todayStr ? ' today' : '');
    if (allEvDates.has(ds)) d.classList.add('has-event');
    d.textContent = i;
    d.onclick = () => { selectedDate = new Date(year, month, i); currentDate = new Date(year, month, i); renderCalendar(); };
    grid.appendChild(d);
  }
}

document.getElementById('miniPrev').onclick = () => { miniDate.setMonth(miniDate.getMonth()-1); renderMini(); };
document.getElementById('miniNext').onclick = () => { miniDate.setMonth(miniDate.getMonth()+1); renderMini(); };

// ============ MAIN CALENDAR ============
function setView(v, btn) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCalendar();
}

function goToday() {
  currentDate = new Date();
  selectedDate = new Date();
  miniDate = new Date();
  renderMini();
  renderCalendar();
}

function renderCalendar() {
  if (currentView === 'month') renderMonth();
  else renderWeek();
}

// MONTH VIEW
function renderMonth() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  document.getElementById('currentPeriod').textContent = `${MONTHS_RO[month]} ${year}`;
  document.getElementById('prevBtn').onclick = () => { currentDate.setMonth(month-1); renderCalendar(); };
  document.getElementById('nextBtn').onclick = () => { currentDate.setMonth(month+1); renderCalendar(); };

  const body = document.getElementById('calendarBody');
  body.className = 'month-view';

  let html = '<div class="month-grid">';
  DAYS_RO.forEach(d => { html += `<div class="day-header">${d}</div>`; });

  const first = new Date(year, month, 1);
  let startDow = first.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayStr = dateStr(new Date());
  const selectedStr = dateStr(selectedDate);

  // Prev month days
  const prevDays = new Date(year, month, 0).getDate();
  for (let i = startDow - 1; i >= 0; i--) {
    const day = prevDays - i;
    const ds = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    html += `<div class="day-cell other-month"><div class="day-number">${day}</div></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = ds === todayStr;
    const isSel = ds === selectedStr;
    const evs = getEventsForDay(ds);

    html += `<div class="day-cell${isToday?' today':''}${isSel?' selected':''}" onclick="selectDay('${ds}')">`;
    html += `<div class="day-number">${d}</div>`;
    evs.slice(0, 3).forEach(e => {
      const color = CAT_COLORS[e.cat] || '#888';
      html += `<div class="event-pill" style="background:${color}" onclick="showDetail(event,'${e.id}')" title="${e.title}">${e.title}</div>`;
    });
    if (evs.length > 3) html += `<div style="font-size:10px;color:var(--ink-muted);padding:1px 4px">+${evs.length-3} mai multe</div>`;
    html += '</div>';
  }

  // Next month
  const totalCells = startDow + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let d = 1; d <= remaining; d++) {
    html += `<div class="day-cell other-month"><div class="day-number">${d}</div></div>`;
  }

  html += '</div>';
  body.innerHTML = html;
}

function selectDay(ds) {
  selectedDate = parseDate(ds);
  renderCalendar();
}

// WEEK VIEW
function renderWeek() {
  const monday = new Date(currentDate);
  const dow = monday.getDay();
  const diff = dow === 0 ? -6 : 1 - dow;
  monday.setDate(monday.getDate() + diff);

  const sunday = new Date(monday);
  sunday.setDate(sunday.getDate() + 6);

  const mStr = `${monday.getDate()} ${MONTHS_RO[monday.getMonth()].slice(0,3)}`;
  const sStr = `${sunday.getDate()} ${MONTHS_RO[sunday.getMonth()].slice(0,3)} ${sunday.getFullYear()}`;
  document.getElementById('currentPeriod').textContent = `${mStr} – ${sStr}`;

  document.getElementById('prevBtn').onclick = () => { currentDate.setDate(currentDate.getDate()-7); renderCalendar(); };
  document.getElementById('nextBtn').onclick = () => { currentDate.setDate(currentDate.getDate()+7); renderCalendar(); };

  const todayStr = dateStr(new Date());
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(d.getDate() + i);
    days.push(d);
  }

  const body = document.getElementById('calendarBody');
  body.className = 'week-view';

  const hours = Array.from({length:24}, (_,i) => i);

  let html = '<div class="week-grid">';

  // Corner
  html += '<div class="day-header time-col" style="background:white"></div>';

  // Day headers
  days.forEach((d, i) => {
    const ds = dateStr(d);
    const isToday = ds === todayStr;
    const numHtml = isToday
      ? `<div class="week-day-num today-num">${d.getDate()}</div>`
      : `<div class="week-day-num">${d.getDate()}</div>`;
    html += `<div class="week-day-header"><div class="week-day-name">${DAYS_RO[i]}</div>${numHtml}</div>`;
  });

  // Time slots
  hours.forEach(h => {
    const label = h === 0 ? '' : `${String(h).padStart(2,'0')}:00`;
    html += `<div class="time-col"><div class="time-slot">${label}</div></div>`;
    days.forEach((d, di) => {
      if (h === 0) return; // handled separately
    });
  });

  // Day columns with events
  days.forEach((d, di) => {
    const ds = dateStr(d);
    const evs = getEventsForDay(ds).filter(e => !e.allDay && e.startTime);
    html += `<div class="week-day-col" style="grid-column:${di+2};grid-row:2/${hours.length+2}">`;
    hours.forEach(h => {
      html += `<div class="week-hour-line"></div>`;
    });
    evs.forEach(e => {
      const [sh,sm] = e.startTime.split(':').map(Number);
      const [eh,em] = (e.endTime||e.startTime).split(':').map(Number);
      const top = (sh + sm/60) * 50;
      const height = Math.max(((eh + em/60) - (sh + sm/60)) * 50, 20);
      const color = CAT_COLORS[e.cat] || '#888';
      html += `<div class="week-event" style="background:${color};top:${top}px;height:${height}px" onclick="showDetail(event,'${e.id}')">
        <div class="week-event-title">${e.title}</div>
        <div class="week-event-time">${e.startTime}${e.endTime?'–'+e.endTime:''}</div>
      </div>`;
    });
    html += '</div>';
  });

  html += '</div>';
  body.innerHTML = html;
}

// ============ MODALS ============
function openAddModal() {
  const today = dateStr(new Date());
  document.getElementById('evStart').value = today;
  document.getElementById('evEnd').value = today;
  document.getElementById('evTitle').value = '';
  document.getElementById('evDesc').value = '';
  document.getElementById('addModal').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function saveEvent() {
  const title = document.getElementById('evTitle').value.trim();
  if (!title) { showToast('Te rog adaugă un titlu!'); return; }
  const ev = {
    id: 'u' + Date.now(),
    title,
    cat: document.getElementById('evCat').value,
    start: document.getElementById('evStart').value,
    end: document.getElementById('evEnd').value || document.getElementById('evStart').value,
    startTime: document.getElementById('evStartTime').value,
    endTime: document.getElementById('evEndTime').value,
    desc: document.getElementById('evDesc').value,
    allDay: !document.getElementById('evStartTime').value
  };
  userEvents.push(ev);
  localStorage.setItem('emilia_events', JSON.stringify(userEvents));
  closeModal('addModal');
  renderCalendar();
  renderMini();
  showToast('✓ Eveniment salvat');
}

function showDetail(e, id) {
  e.stopPropagation();
  const all = getAllEvents();
  const ev = all.find(x => x.id === id);
  if (!ev) return;
  const color = CAT_COLORS[ev.cat] || '#888';
  const catName = CAT_NAMES[ev.cat] || ev.cat;
  let html = `
    <div class="detail-cat-badge" style="background:${color}">${catName}</div>
    <div class="detail-title">${ev.title}</div>
    <div class="detail-meta">
      <span>📅 ${ev.start}${ev.end && ev.end !== ev.start ? ' → ' + ev.end : ''}</span>
      ${ev.startTime ? `<span>🕐 ${ev.startTime}${ev.endTime ? ' – ' + ev.endTime : ''}</span>` : ''}
    </div>
  `;
  if (ev.desc || ev.event_description) {
    const desc = ev.desc || ev.event_description || '';
    const short = desc.length > 200 ? desc.slice(0, 200) + '…' : desc;
    html += `<div class="detail-desc">${short.replace(/\n/g,'<br>')}</div>`;
  }
  html += `<div class="detail-actions">
    <button class="detail-btn" onclick="closeModal('detailModal')">Închide</button>
    ${ev.cat !== 'google' ? `<button class="detail-btn primary" onclick="deleteEvent('${ev.id}')">Șterge</button>` : ''}
  </div>`;
  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailModal').classList.add('open');
}

function deleteEvent(id) {
  userEvents = userEvents.filter(e => e.id !== id);
  localStorage.setItem('emilia_events', JSON.stringify(userEvents));
  closeModal('detailModal');
  renderCalendar();
  showToast('Eveniment șters');
}

// Close on overlay click
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('open'); });
});

// ============ FILTER ============
function filterCat(cat) {
  activeFilter = cat;
  document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  renderCalendar();
}

// ============ JOURNAL ============
function openJournal(tab) {
  currentJournalTab = tab;
  const panel = document.getElementById('journalPanel');
  panel.classList.add('open');
  updateJournalTab();
  const today = new Date();
  document.getElementById('journalPanelDate').textContent = `${today.getDate()} ${MONTHS_RO[today.getMonth()]} ${today.getFullYear()}`;
}

function closeJournal() {
  document.getElementById('journalPanel').classList.remove('open');
}

function switchTab(tab) {
  saveJournalSilent();
  currentJournalTab = tab;
  updateJournalTab();
}

function updateJournalTab() {
  document.getElementById('tab-notes').classList.toggle('active', currentJournalTab === 'notes');
  document.getElementById('tab-reflections').classList.toggle('active', currentJournalTab === 'reflections');
  document.getElementById('journalPanelTitle').textContent = currentJournalTab === 'notes' ? 'Notițe zilnice' : 'Reflecții';

  const key = `${dateStr(new Date())}_${currentJournalTab}`;
  const text = journalData[key] || '';
  document.getElementById('journalText').value = text;
  updateWordCount();

  document.getElementById('journalText').placeholder = currentJournalTab === 'notes'
    ? 'Ce s-a întâmplat azi? Ce ai realizat? Ce ai de făcut?'
    : 'Ce simți? Ce ai observat? Ce vrei să înțelegi mai bine?';
}

function updateWordCount() {
  const text = document.getElementById('journalText').value;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  document.getElementById('wordCount').textContent = `${words} cuvinte`;
}

document.getElementById('journalText').addEventListener('input', updateWordCount);

function saveJournalSilent() {
  const key = `${dateStr(new Date())}_${currentJournalTab}`;
  journalData[key] = document.getElementById('journalText').value;
  localStorage.setItem('emilia_journal', JSON.stringify(journalData));
}

function saveJournal() {
  saveJournalSilent();
  showToast('✓ Salvat');
}

// ============ INIT ============
renderMini();
renderCalendar();
</script>
</body>
</html>
